<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白牌跑車車資計算器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        :root { --bg-color: #f3f4f6; --card-bg: rgba(255, 255, 255, 0.9); --text-color: #1f2937; --accent-color: #4f46e5; }
        .dark { --bg-color: #111827; --card-bg: rgba(31, 41, 55, 0.9); --text-color: #f9fafb; --accent-color: #818cf8; }
        #map { height: 400px; width: 100%; border-radius: 0.5rem; }
        @media (min-width: 1024px) { #map { height: 600px; } }
        .glass-morphism { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: var(--text-color); }
        body { background-color: var(--bg-color); color: var(--text-color); }
        .dark .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }
        .spinner { border-top-color: var(--accent-color); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-shake { animation: shake 0.5s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } }
    </style>
</head>
<body class="min-h-screen font-sans pb-10 transition-colors duration-300">
    <div id="loading-overlay" class="hidden fixed inset-0 bg-gray-900/50 z-[4000] flex items-center justify-center">
        <div class="spinner w-16 h-16 border-4 border-gray-300 rounded-full"></div>
    </div>
    <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-lg transform translate-x-[120%] transition-all z-[3000] opacity-0"><p id="toast-message"></p></div>

    <!-- 啟用畫面 -->
    <div id="activation-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-80 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 text-center">
            <h2 id="activation-title" class="text-2xl font-bold text-gray-800 dark:text-white mb-2 cursor-pointer">程式啟用</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-6">請輸入授權碼以解鎖功能</p>
            <input type="text" id="licenseKeyInput" placeholder="請在此輸入授權碼" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-lg text-center mb-4 text-black dark:text-white">
            <button id="activateBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700">啟用程式</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-4"></p>
        </div>
    </div>

    <!-- 主程式內容 -->
    <div id="appContainer" class="hidden container mx-auto px-4 py-4 lg:py-8">
        <header class="text-center mb-6 relative">
            <button id="darkModetoggle" class="absolute right-0 top-0 p-2 rounded-full bg-white dark:bg-gray-800 shadow-md"><span id="darkModeIcon">🌙</span></button>
            <h1 class="text-2xl lg:text-4xl font-extrabold text-indigo-600 dark:text-indigo-400">🚗 車資計算器</h1>
        </header>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-morphism p-6 rounded-xl shadow-lg border-2 border-indigo-500/30">
                    <h2 class="text-xl font-bold mb-4 flex justify-between"><span>⚙️ 費率自定義</span><button id="addStopBtn" class="text-xs bg-indigo-500 text-white px-2 py-1 rounded">+中途點</button></h2>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold mb-1 text-indigo-600">起跳費 (元)</label><input type="number" id="baseFare" value="100" class="w-full px-3 py-2 rounded-md text-black"></div>
                        <div><label class="block text-sm font-bold mb-1 text-indigo-600">每公里費用 (元)</label><input type="number" id="farePerKm" value="25" class="w-full px-3 py-2 rounded-md text-black"></div>
                        <div><label class="block text-sm font-bold mb-1 text-indigo-600">每分鐘費用 (元)</label><input type="number" id="farePerMin" value="5" class="w-full px-3 py-2 rounded-md text-black"></div>
                    </div>
                </div>
                <div id="resultBox" class="glass-morphism p-6 rounded-xl shadow-lg hidden">
                    <div class="space-y-3">
                        <div class="flex justify-between border-b pb-2"><span>距離:</span><span id="resDistance" class="font-bold">-</span></div>
                        <div class="flex justify-between border-b pb-2"><span>時間:</span><span id="resDuration" class="font-bold">-</span></div>
                        <div class="flex justify-between items-center pt-2"><span class="text-lg font-bold">預估車資:</span><span id="resTotalFare" class="text-3xl font-black text-indigo-600">NT$ 0</span></div>
                        <button id="shareBtn" class="w-full mt-4 bg-green-500 text-white py-2 rounded-lg font-bold">📋 分享給客戶</button>
                    </div>
                </div>
                <div class="space-y-2">
                    <button id="locateBtn" class="w-full bg-white dark:bg-gray-800 py-2 rounded-md text-indigo-600 border border-indigo-200">📍 使用當前位置</button>
                    <button id="resetBtn" class="w-full bg-red-50 py-2 rounded-md text-red-600 border border-red-200">🔄 重置路徑</button>
                </div>
            </div>
            <div class="lg:col-span-2"><div class="bg-white p-2 rounded-xl shadow-xl relative"><input type="text" id="searchAddr" placeholder="搜尋地點..." class="absolute top-4 left-4 right-4 z-[1000] px-4 py-2 rounded-full shadow-lg border-none text-black"><div id="map"></div></div></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        // --- 核心設定 ---
        const API_BASE_URL = window.location.hostname.includes('localhost') ? 'http://localhost:3000' : window.location.origin;
        const activationOverlay = document.getElementById('activation-overlay');
        const appContainer = document.getElementById('appContainer');
        const activateBtn = document.getElementById('activateBtn');
        const licenseKeyInput = document.getElementById('licenseKeyInput');
        const errorMsg = document.getElementById('errorMsg');

        // --- 管理員後門 (連點標題5次強制進入) ---
        let clickCount = 0;
        document.getElementById('activation-title').onclick = () => {
            clickCount++;
            if(clickCount >= 5) { unlockApp(); showToast('管理員模式已啟動'); }
        };

        // --- 地圖邏輯 ---
        const map = L.map('map', { zoomControl: false }).setView([25.0330, 121.5654], 13);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let routingControl = null, waypoints = [];

        function calculateFare(dist, time) {
            const b = parseFloat(document.getElementById('baseFare').value) || 0;
            const k = parseFloat(document.getElementById('farePerKm').value) || 0;
            const m = parseFloat(document.getElementById('farePerMin').value) || 0;
            const total = Math.ceil(b + (dist/1000 * k) + (time/60 * m));
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('resDistance').innerText = (dist/1000).toFixed(2) + ' km';
            document.getElementById('resDuration').innerText = Math.round(time/60) + ' min';
            document.getElementById('resTotalFare').innerText = 'NT$ ' + total;
            localStorage.setItem('baseFare', b); localStorage.setItem('farePerKm', k); localStorage.setItem('farePerMin', m);
        }

        function updateRouting() {
            if (routingControl) map.removeControl(routingControl);
            if (waypoints.length < 2) return;
            showLoader();
            routingControl = L.Routing.control({
                waypoints: waypoints,
                show: false,
                createMarker: (i, wp) => L.marker(wp.latLng, { draggable: true })
            }).on('routesfound', (e) => {
                calculateFare(e.routes[0].summary.totalDistance, e.routes[0].summary.totalTime);
                hideLoader();
            }).on('routingerror', () => { showToast('路徑失敗', 'error'); hideLoader(); }).addTo(map);
        }

        map.on('click', (e) => {
            waypoints.push(e.latlng);
            L.marker(e.latlng).addTo(map);
            if (waypoints.length >= 2) updateRouting();
        });

        document.getElementById('resetBtn').onclick = () => location.reload();
        document.getElementById('addStopBtn').onclick = () => showToast('請點選地圖');

        // --- 授權邏輯 ---
        function getDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) { id = crypto.randomUUID(); localStorage.setItem('deviceId', id); }
            return id;
        }

        async function checkActivation() {
            const deviceId = getDeviceId();
            try {
                const r = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceId })
                });
                const d = await r.json();
                if (d.isActivated) unlockApp();
            } catch (e) { console.log('尚未啟用'); }
        }

        function unlockApp() {
            activationOverlay.style.opacity = '0';
            setTimeout(() => {
                activationOverlay.classList.add('hidden');
                appContainer.classList.remove('hidden');
                ['baseFare','farePerKm','farePerMin'].forEach(id=>{
                    const v = localStorage.getItem(id); if(v) document.getElementById(id).value = v;
                });
            }, 500);
        }

        activateBtn.onclick = async () => {
            const key = licenseKeyInput.value.trim();
            if (!key) return showToast('請輸入授權碼', 'error');
            showLoader();
            try {
                const r = await fetch(`${API_BASE_URL}/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ licenseKey: key, deviceId: getDeviceId() })
                });
                const d = await r.json();
                if (d.success) unlockApp();
                else errorMsg.innerText = d.message || '啟用失敗';
            } catch (e) { 
                errorMsg.innerText = '連線失敗，請檢查 Vercel 後端是否正常。';
            } finally { hideLoader(); }
        };

        // --- UI 工具 ---
        function showLoader() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loading-overlay').classList.add('hidden'); }
        function showToast(m, type='success') {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').innerText = m;
            t.classList.remove('translate-x-[120%]', 'opacity-0');
            t.classList.add('bg-green-500'); if(type==='error') t.classList.add('bg-red-500');
            setTimeout(() => { t.classList.add('translate-x-[120%]', 'opacity-0'); }, 3000);
        }

        document.getElementById('shareBtn').onclick = async () => {
            const text = `🚗 車資預估：\n路程：${document.getElementById('resDistance').innerText}\n時間：${document.getElementById('resDuration').innerText}\n車資：${document.getElementById('resTotalFare').innerText}\n(實際以路況為準)`;
            if (navigator.share) await navigator.share({ text });
            else { navigator.clipboard.writeText(text); showToast('已複製'); }
        };

        document.addEventListener('DOMContentLoaded', checkActivation);
    </script>
</body>
</html>
