<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白牌跑車車資計算器</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="車資計算">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1f2937;
            --accent-color: #4f46e5;
            --border-color: rgba(255, 255, 255, 0.2);
        }
        .dark {
            --bg-color: #111827;
            --card-bg: rgba(31, 41, 55, 0.9);
            --text-color: #f9fafb;
            --accent-color: #818cf8;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        #map { height: 400px; width: 100%; border-radius: 0.5rem; }
        @media (min-width: 1024px) {
            #map { height: 600px; }
        }
        .glass-morphism {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
        body { background-color: var(--bg-color); color: var(--text-color); }
        .dark .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }

        /* 讓輸入框看起來更明顯可以改 */
        input[type="number"] {
            background: #ffffff;
            border: 2px solid #e5e7eb;
            font-weight: bold;
            color: #111827;
        }
        .dark input[type="number"] {
            background: #374151;
            border: 2px solid #4b5563;
            color: #ffffff;
        }

        #activation-overlay { transition: opacity 0.5s ease-in-out; }
        #toast { transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out; }
        .spinner { border-top-color: var(--accent-color); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="min-h-screen font-sans pb-10 transition-colors duration-300">

    <!-- Global Loading Spinner -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[4000] flex items-center justify-center">
        <div class="spinner w-16 h-16 border-4 border-gray-300 rounded-full"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-lg transform translate-x-[120%] opacity-0 z-[3000]">
        <p id="toast-message"></p>
    </div>

    <!-- Activation Overlay -->
    <div id="activation-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-80 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">程式啟用</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-6">請輸入您的授權碼以解鎖全部功能。</p>
            <input type="text" id="licenseKeyInput" placeholder="請在此輸入授權碼" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
            <button id="activateBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-transform transform hover:scale-105">啟用程式</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-4 h-4"></p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="hidden container mx-auto px-4 py-4 lg:py-8">
        <header class="text-center mb-6 lg:mb-10 relative">
            <div class="absolute right-0 top-0">
                <button id="darkModetoggle" class="p-2 rounded-full bg-white dark:bg-gray-800 shadow-md">
                    <span id="darkModeIcon">🌙</span>
                </button>
            </div>
            <h1 class="text-2xl lg:text-4xl font-extrabold text-indigo-600 dark:text-indigo-400">🚗 車資計算器</h1>
            <p class="text-gray-600 dark:text-gray-400 text-sm mt-1">白牌跑車專用路徑規劃</p>
            <button id="installBtn" class="hidden mt-4 bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center mx-auto">
                <span class="mr-2">📲</span> 安裝到手機桌面
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <!-- 費率設定 (司機在此自行修改) -->
                <div class="glass-morphism p-6 rounded-xl shadow-lg border-2 border-indigo-500/30">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold flex items-center">
                            <span class="mr-2">⚙️</span> 司機費率自定義
                        </h2>
                        <button id="addStopBtn" class="text-xs bg-indigo-500 text-white px-2 py-1 rounded hover:bg-indigo-600 transition-colors">
                            + 中途點
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-1 text-indigo-600 dark:text-indigo-400">起跳費 (元)</label>
                            <input type="number" id="baseFare" value="100" class="w-full px-3 py-3 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-indigo-600 dark:text-indigo-400">每公里費用 (元/km)</label>
                            <input type="number" id="farePerKm" value="25" class="w-full px-3 py-3 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-indigo-600 dark:text-indigo-400">每分鐘費用 (元/min)</label>
                            <input type="number" id="farePerMin" value="5" class="w-full px-3 py-3 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
                        </div>
                        <p class="text-xs text-gray-500 italic">* 修改後系統將自動儲存您的費率設定</p>
                    </div>
                </div>

                <!-- 計算結果 -->
                <div id="resultBox" class="glass-morphism p-6 rounded-xl shadow-lg hidden">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-indigo-700 dark:text-indigo-400">
                        <span class="mr-2">📊</span> 預估詳情
                    </h2>
                    <div class="space-y-3">
                        <div class="flex justify-between border-b dark:border-gray-700 pb-2">
                            <span>預估距離:</span>
                            <span id="resDistance" class="font-semibold">- km</span>
                        </div>
                        <div class="flex justify-between border-b dark:border-gray-700 pb-2">
                            <span>預估時間:</span>
                            <span id="resDuration" class="font-semibold">- min</span>
                        </div>
                        <div class="mt-4 pt-4 border-t border-indigo-200 dark:border-indigo-900">
                            <div class="flex justify-between items-center">
                                <span class="text-lg font-bold">預估車資:</span>
                                <span id="resTotalFare" class="text-3xl font-black text-indigo-600 dark:text-indigo-400">NT$ 0</span>
                            </div>
                        </div>
                        <button id="shareBtn" class="w-full mt-4 bg-green-500 text-white py-2 rounded-lg font-bold hover:bg-green-600 transition-colors flex items-center justify-center">
                            <span class="mr-2">📋</span> 複製結果傳送給客戶
                        </button>
                    </div>
                </div>

                <div class="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-lg text-sm text-indigo-800 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800 space-y-2">
                    <p>💡 提示：點地圖兩次（起終點），系統會自動計算。司機可隨時修改上方費率。</p>
                    <button id="locateBtn" class="w-full bg-white dark:bg-gray-800 border border-indigo-200 dark:border-indigo-800 py-2 rounded-md text-indigo-600 dark:text-indigo-400 font-medium hover:bg-indigo-50 dark:hover:bg-indigo-900/50 transition-colors flex items-center justify-center">
                        <span class="mr-2">📍</span> 使用我的當前位置
                    </button>
                    <button id="resetBtn" class="w-full bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 py-2 rounded-md text-red-600 dark:text-red-400 font-medium hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors flex items-center justify-center mt-2">
                        <span class="mr-2">🔄</span> 重置路徑
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-gray-800 p-2 rounded-xl shadow-xl relative border dark:border-gray-700">
                    <div class="absolute top-4 left-4 right-4 z-[1000] flex gap-2">
                        <input type="text" id="searchAddr" placeholder="搜尋地點..." class="flex-1 px-4 py-2 rounded-full shadow-lg border-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400">
                    </div>
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // --- 授權與 API 設定 ---
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '5500';
        const API_BASE_URL = isLocal ? 'http://localhost:3000' : 'https://car-fare-app-tllk.vercel.app'; 

        const activationOverlay = document.getElementById('activation-overlay');
        const appContainer = document.getElementById('appContainer');
        const activateBtn = document.getElementById('activateBtn');
        const licenseKeyInput = document.getElementById('licenseKeyInput');
        const errorMsg = document.getElementById('errorMsg');

        // --- 地圖初始化 ---
        const map = L.map('map', { zoomControl: false }).setView([25.0330, 121.5654], 13);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);

        let routingControl = null;
        let markers = [];
        let waypoints = [];

        // --- 核心邏輯 ---
        function loadSettings() {
            ['baseFare', 'farePerKm', 'farePerMin'].forEach(id => {
                const saved = localStorage.getItem(id);
                if
