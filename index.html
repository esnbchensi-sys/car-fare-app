<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白牌跑車車資計算器</title>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="車資計算">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #1f2937;
            --accent-color: #4f46e5;
            --border-color: rgba(255, 255, 255, 0.2);
        }
        .dark {
            --bg-color: #111827;
            --card-bg: rgba(31, 41, 55, 0.9);
            --text-color: #f9fafb;
            --accent-color: #818cf8;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        #map { position: fixed; top: 0; left: 0; height: 100vh; width: 100vw; z-index: 0; }
        .glass-morphism {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
        body { background-color: var(--bg-color); color: var(--text-color); }
        .dark .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }

        #activation-overlay {
            transition: opacity 0.5s ease-in-out;
        }

        #toast {
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
        }

        .spinner {
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 新增樣式 */
        #bottom-panel {
            transition: transform 0.3s ease-in-out;
        }

        .custom-marker {
            background-color: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            width: 12px !important;
            height: 12px !important;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen font-sans overflow-hidden">

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- Global Loading Spinner -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-[4000] flex items-center justify-center">
        <div class="spinner w-16 h-16 border-4 border-gray-300 rounded-full"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-lg transform translate-x-[120%] opacity-0 z-[3000]">
        <p id="toast-message"></p>
    </div>

    <!-- Activation Overlay -->
    <div id="activation-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-80 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">程式啟用</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-6">請輸入您的授權碼以解鎖全部功能。</p>
            <input type="text" id="licenseKeyInput" placeholder="請在此輸入授權碼" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
            <button id="activateBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-transform transform hover:scale-105">啟用程式</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-4 h-4"></p>
        </div>
    </div>

    <!-- 主應用程式容器 -->
    <div id="appContainer" class="hidden fixed inset-0 pointer-events-none">
        <!-- 頂部資訊列 -->
        <div id="top-bar" class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center pointer-events-auto">
            <div id="rate-display" class="glass-morphism px-4 py-2 rounded-full font-mono font-bold text-lg cursor-pointer">
                <span id="baseFareDisplay">100</span>/<span id="farePerKmDisplay">25</span>/<span id="farePerMinDisplay">5</span>
            </div>
            <div class="flex gap-2">
                <button id="historyBtn" class="glass-morphism w-10 h-10 flex items-center justify-center rounded-full text-xl">📜</button>
                <button id="resetBtn" class="glass-morphism w-10 h-10 flex items-center justify-center rounded-full text-xl">🔄</button>
                <button id="darkModetoggle" class="glass-morphism w-10 h-10 flex items-center justify-center rounded-full text-xl">
                    <span id="darkModeIcon">🌙</span>
                </button>
            </div>
        </div>

        <!-- 搜尋與定位按鈕 -->
        <div class="absolute top-20 left-4 right-4 flex gap-2 pointer-events-auto">
            <input type="text" id="searchAddr" placeholder="搜尋地點..." class="flex-1 glass-morphism px-4 py-2 rounded-full shadow-lg border-none focus:ring-2 focus:ring-indigo-500">
            <button id="locateBtn" class="glass-morphism w-10 h-10 flex items-center justify-center rounded-full text-xl">📍</button>
            <button id="manualInputBtn" class="glass-morphism w-10 h-10 flex items-center justify-center rounded-full text-xl" title="手動輸入(無訊號時用)">⌨️</button>
        </div>

        <!-- 底部結果面板 -->
        <div id="bottom-panel" class="absolute bottom-0 left-0 right-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-t-2xl shadow-2xl p-6 transform translate-y-full pointer-events-auto">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <div class="text-5xl font-black text-indigo-600 dark:text-indigo-400" id="resTotalFare">$0</div>
                    <div class="text-xs text-gray-400 mt-1" id="fareBreakdown">計算中...</div>
                </div>
                <div class="flex gap-2">
                    <button id="navBtn" class="bg-indigo-500 text-white w-12 h-12 flex items-center justify-center rounded-full text-2xl font-bold hover:bg-indigo-600 transition-colors" title="開啟導航">🧭</button>
                    <button id="shareBtn" class="bg-green-500 text-white w-12 h-12 flex items-center justify-center rounded-full text-2xl font-bold hover:bg-green-600 transition-colors">📋</button>
                </div>
            </div>
            <div class="mt-4 grid grid-cols-3 gap-4 text-center">
                <div>
                    <div class="text-2xl font-bold" id="resDistance">-</div>
                    <div class="text-sm text-gray-500">km</div>
                </div>
                <div>
                    <div class="text-2xl font-bold" id="resDuration">-</div>
                    <div class="text-sm text-gray-500">min</div>
                </div>
                <div>
                    <div class="text-2xl font-bold" id="resBaseFare">-</div>
                    <div class="text-sm text-gray-500">起步</div>
                </div>
            </div>
        </div>

        <!-- 費率設定彈窗 -->
        <div id="rate-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 pointer-events-auto">
            <div class="glass-morphism w-full max-w-sm rounded-2xl p-6">
                <h2 class="text-xl font-bold mb-4">費率設定</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">起跳費 (元)</label>
                        <input type="number" id="baseFare" value="100" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">每公里費用 (元/km)</label>
                        <input type="number" id="farePerKm" value="25" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">每分鐘費用 (元/min)</label>
                        <input type="number" id="farePerMin" value="5" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium mb-1">最低消費 (元)</label>
                            <input type="number" id="minFare" value="150" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">加成係數 (1.0=原價)</label>
                            <input type="number" id="adjFactor" value="1.0" step="0.1" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">進位規則</label>
                        <select id="roundingRule" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md">
                            <option value="1">無條件進位到 1 元</option>
                            <option value="5">無條件進位到 5 元</option>
                            <option value="10">無條件進位到 10 元</option>
                        </select>
                    </div>
                </div>
                <button id="saveRateBtn" class="mt-6 w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700">儲存設定</button>
                
                <!-- PWA 安裝按鈕 -->
                <button id="installBtn" class="hidden mt-4 w-full bg-green-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-green-700 flex items-center justify-center">
                    <span class="mr-2">📲</span> 安裝到手機桌面
                </button>
            </div>
        </div>

        <!-- 歷史紀錄彈窗 -->
        <div id="history-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 pointer-events-auto">
            <div class="glass-morphism w-full max-w-md rounded-2xl p-6 flex flex-col max-h-[80vh]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">歷史紀錄</h2>
                    <button id="closeHistoryBtn" class="text-2xl">✕</button>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto space-y-3 pr-2">
                    <!-- 紀錄會動態插入在此 -->
                    <p class="text-center text-gray-500 py-10">尚無紀錄</p>
                </div>
                <button id="clearHistoryBtn" class="mt-4 w-full bg-red-100 text-red-600 font-bold py-2 rounded-lg hover:bg-red-200">清除所有紀錄</button>
            </div>
        </div>

        <!-- 手動輸入彈窗 (訊號丟失時) -->
        <div id="manual-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 pointer-events-auto">
            <div class="glass-morphism w-full max-w-sm rounded-2xl p-6">
                <h2 class="text-xl font-bold mb-4">緊急模式 (手動輸入)</h2>
                <p class="text-sm text-gray-500 mb-4">當網路不穩或 GPS 丟失時，請手動輸入實際里程與時間。</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">總里程 (km)</label>
                        <input type="number" id="manualKm" step="0.1" placeholder="例如: 5.2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">總時間 (分鐘)</label>
                        <input type="number" id="manualMin" placeholder="例如: 15" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 rounded-md">
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button id="cancelManualBtn" class="flex-1 bg-gray-200 text-gray-800 font-bold py-3 rounded-lg">取消</button>
                    <button id="confirmManualBtn" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-lg">計算</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // 初始化地圖 (預設位置: 台北)
        const map = L.map('map', {
            zoomControl: false // 手機版建議隱藏，騰出空間
        }).setView([25.0330, 121.5654], 13);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let tileLayer = null;
        let routingControl = null;
        let tempMarkers = [];
        let waypoints = [];

        // 更新地圖主題
        function updateMapTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            const newUrl = isDark 
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' // Positron (夜間)
                : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'; // Voyager (日間)
            
            if (tileLayer) {
                tileLayer.setUrl(newUrl);
            } else {
                tileLayer = L.tileLayer(newUrl, {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    subdomains: 'abcd',
                    maxZoom: 20
                }).addTo(map);
            }
        }

        // 更新頂部費率顯示
        function updateRateDisplay() {
            document.getElementById('baseFareDisplay').innerText = document.getElementById('baseFare').value;
            document.getElementById('farePerKmDisplay').innerText = document.getElementById('farePerKm').value;
            document.getElementById('farePerMinDisplay').innerText = document.getElementById('farePerMin').value;
        }

        // 載入儲存的費率與主題
        function loadSettings() {
            ['baseFare', 'farePerKm', 'farePerMin', 'minFare', 'adjFactor', 'roundingRule'].forEach(id => {
                const saved = localStorage.getItem(id);
                if (saved) document.getElementById(id).value = saved;
            });
            if (localStorage.getItem('darkMode') === 'true') {
                document.documentElement.classList.add('dark');
            }
            updateDarkModeUI();
            updateMapTheme();
            updateRateDisplay();
            updateHistoryUI();
        }
        loadSettings();

        // 夜間模式切換
        const darkModeBtn = document.getElementById('darkModetoggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        
        darkModeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeUI();
            updateMapTheme(); // 切換地圖主題
        });

        function updateDarkModeUI() {
            const isDark = document.documentElement.classList.contains('dark');
            darkModeIcon.innerText = isDark ? '☀️' : '🌙';
        }

        // 車資計算
        function calculateFare(distanceMeters, durationSeconds, isManual = false) {
            const baseFare = parseFloat(document.getElementById('baseFare').value) || 0;
            const farePerKm = parseFloat(document.getElementById('farePerKm').value) || 0;
            const farePerMin = parseFloat(document.getElementById('farePerMin').value) || 0;
            const minFare = parseFloat(document.getElementById('minFare').value) || 0;
            const adjFactor = parseFloat(document.getElementById('adjFactor').value) || 1.0;
            const roundingRule = parseInt(document.getElementById('roundingRule').value) || 1;

            const distanceKm = distanceMeters / 1000;
            const durationMin = durationSeconds / 60;

            // 計算拆解
            const distCost = distanceKm * farePerKm;
            const timeCost = durationMin * farePerMin;
            let subTotal = (baseFare + distCost + timeCost) * adjFactor;
            
            // 是否低於最低消費
            let isMinFareApplied = false;
            if (subTotal < minFare) {
                subTotal = minFare;
                isMinFareApplied = true;
            }

            // 進位規則
            let finalFare = Math.ceil(subTotal);
            if (roundingRule > 1) {
                finalFare = Math.ceil(finalFare / roundingRule) * roundingRule;
            }
            
            // 更新 UI
            document.getElementById('bottom-panel').classList.remove('translate-y-full');
            document.getElementById('resDistance').innerText = distanceKm.toFixed(1);
            document.getElementById('resDuration').innerText = Math.round(durationMin);
            document.getElementById('resBaseFare').innerText = baseFare;
            document.getElementById('resTotalFare').innerText = '$' + finalFare;
            
            // 顯示拆解
            const breakdownText = isMinFareApplied 
                ? `已達最低消費 $${minFare}`
                : `(${baseFare} + ${distCost.toFixed(1)} + ${timeCost.toFixed(1)}) x ${adjFactor}`;
            document.getElementById('fareBreakdown').innerText = breakdownText;

            // 儲存設定
            ['baseFare', 'farePerKm', 'farePerMin', 'minFare', 'adjFactor', 'roundingRule'].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value);
            });
            updateRateDisplay();

            // 儲存至歷史紀錄
            saveToHistory({
                date: new Date().toLocaleString('zh-TW'),
                fare: finalFare,
                distance: distanceKm.toFixed(1),
                duration: Math.round(durationMin),
                rates: `${baseFare}/${farePerKm}/${farePerMin}${adjFactor !== 1 ? ' x' + adjFactor : ''}`,
                isManual: isManual
            });
        }

        // --- 歷史紀錄功能 ---
        function saveToHistory(record) {
            let history = JSON.parse(localStorage.getItem('tripHistory') || '[]');
            history.unshift(record); // 最新紀錄在最前面
            // 只保留最近 50 筆
            if (history.length > 50) history = history.slice(0, 50);
            localStorage.setItem('tripHistory', JSON.stringify(history));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('tripHistory') || '[]');
            
            if (history.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-500 py-10">尚無紀錄</p>';
                return;
            }

            list.innerHTML = history.map((h, index) => `
                <div class="glass-morphism p-3 rounded-xl flex justify-between items-center border-l-4 ${h.isManual ? 'border-red-500' : 'border-indigo-500'}">
                    <div>
                        <div class="text-xs text-gray-500">${h.date} ${h.isManual ? '(手動)' : ''}</div>
                        <div class="font-bold text-lg text-indigo-600 dark:text-indigo-400">$${h.fare}</div>
                    </div>
                    <div class="text-right text-sm">
                        <div>${h.distance} km / ${h.duration} min</div>
                        <div class="text-xs text-gray-400">費率: ${h.rates}</div>
                    </div>
                </div>
            `).join('');
        }

        // --- 手動輸入功能 ---
        const manualModal = document.getElementById('manual-modal');
        const manualInputBtn = document.getElementById('manualInputBtn');
        const confirmManualBtn = document.getElementById('confirmManualBtn');
        const cancelManualBtn = document.getElementById('cancelManualBtn');

        manualInputBtn.addEventListener('click', () => manualModal.classList.remove('hidden'));
        cancelManualBtn.addEventListener('click', () => manualModal.classList.add('hidden'));

        confirmManualBtn.addEventListener('click', () => {
            const km = parseFloat(document.getElementById('manualKm').value);
            const min = parseFloat(document.getElementById('manualMin').value);
            
            if (isNaN(km) || isNaN(min) || km < 0 || min < 0) {
                showToast('請輸入正確的里程與時間', 'error');
                return;
            }

            manualModal.classList.add('hidden');
            // 將 km 轉為公尺，min 轉為秒以符合計算函式
            calculateFare(km * 1000, min * 60, true);
            showToast('已手動計算完成');
        });

        // --- 歷史紀錄介面邏輯 ---
        const historyModal = document.getElementById('history-modal');
        const historyBtn = document.getElementById('historyBtn');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        historyBtn.addEventListener('click', () => {
            updateHistoryUI();
            historyModal.classList.remove('hidden');
        });
        closeHistoryBtn.addEventListener('click', () => historyModal.classList.add('hidden'));
        clearHistoryBtn.addEventListener('click', () => {
            if (confirm('確定要清除所有紀錄嗎？')) {
                localStorage.removeItem('tripHistory');
                updateHistoryUI();
            }
        });

        // 更新路徑規劃
        function updateRouting() {
            if (routingControl) {
                map.removeControl(routingControl);
            }

            // 清除所有暫時標記，改由 Routing 顯示
            tempMarkers.forEach(m => map.removeLayer(m));
            tempMarkers = [];

            if (waypoints.length >= 2) {
                showLoader(); // 顯示載入動畫
                routingControl = L.Routing.control({
                    waypoints: waypoints,
                    routeWhileDragging: true,
                    show: false,
                    language: 'zh',
                    createMarker: function(i, wp) {
                        return L.marker(wp.latLng, {
                            draggable: true,
                            icon: L.divIcon({className: 'custom-marker'}) // 使用自訂的透明圖標
                        });
                    }
                }).on('routesfound', function(e) {
                    const routes = e.routes;
                    const summary = routes[0].summary;
                    calculateFare(summary.totalDistance, summary.totalTime);
                    hideLoader(); // 隱藏載入動畫
                }).on('routingerror', function(e) {
                    showToast('路徑規劃失敗，請檢查網路或地點。', 'error');
                    hideLoader(); // 隱藏載入動畫
                }).addTo(map);
            }
        }

        // 當地圖被點擊時
        function handleMapClick(latlng) {
            waypoints.push(L.latLng(latlng));
            
            // 建立暫時的點標記，給使用者即時回饋
            const m = L.marker(latlng, {
                icon: L.divIcon({className: 'custom-marker'})
            }).addTo(map);
            tempMarkers.push(m);

            if (waypoints.length >= 2) {
                updateRouting();
            }
        }

        map.on('click', (e) => handleMapClick(e.latlng));

        // 重置路徑
        function resetPath() {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            tempMarkers.forEach(m => map.removeLayer(m));
            tempMarkers = [];
            waypoints = [];
            document.getElementById('bottom-panel').classList.add('translate-y-full');
        }

        document.getElementById('resetBtn').addEventListener('click', resetPath);

        // 費率設定彈窗邏輯
        const rateDisplay = document.getElementById('rate-display');
        const rateModal = document.getElementById('rate-modal');
        const saveRateBtn = document.getElementById('saveRateBtn');

        rateDisplay.addEventListener('click', () => {
            rateModal.classList.remove('hidden');
        });

        saveRateBtn.addEventListener('click', () => {
            rateModal.classList.add('hidden');
            // 重新計算費用並儲存
            if (routingControl && routingControl._selectedRoute) {
                const summary = routingControl._selectedRoute.summary;
                calculateFare(summary.totalDistance, summary.totalTime);
            } else {
                // 如果還沒有路徑，只儲存並更新顯示
                ['baseFare', 'farePerKm', 'farePerMin', 'minFare', 'adjFactor'].forEach(id => {
                    localStorage.setItem(id, document.getElementById(id).value);
                });
                updateRateDisplay();
            }
        });

        // 定位功能
        document.getElementById('locateBtn').addEventListener('click', () => {
            map.locate({setView: true, maxZoom: 16});
        });

        map.on('locationfound', (e) => {
            handleMapClick(e.latlng);
        });

        // 搜尋功能
        document.getElementById('searchAddr').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = this.value;
                if (!query) return;
                showLoader();
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.length > 0) {
                            const result = data[0];
                            const latlng = [parseFloat(result.lat), parseFloat(result.lon)];
                            map.setView(latlng, 16);
                            handleMapClick(latlng);
                        } else {
                            showToast('找不到該地點', 'error');
                        }
                    })
                    .catch(() => showToast('搜尋失敗，請檢查網路連線。', 'error'))
                    .finally(() => hideLoader());
            }
        });

        // 分享功能
        document.getElementById('shareBtn').addEventListener('click', async () => {
            const distance = document.getElementById('resDistance').innerText + ' km';
            const duration = document.getElementById('resDuration').innerText + ' min';
            const fare = document.getElementById('resTotalFare').innerText;
            const text = `🚗 車資預估報告：\n------------------\n📍 預估距離：${distance}\n⏱️ 預估時間：${duration}\n💰 總計車資：${fare}\n------------------\n(僅供參考，以實際路況為準)`;
            
            if (navigator.share) {
                try {
                    await navigator.share({ title: '車資預估報告', text: text });
                } catch (err) { console.log('分享取消或失敗', err); }
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('已複製到剪貼簿！');
                });
            }
        });

        // 導航功能
        document.getElementById('navBtn').addEventListener('click', () => {
            if (waypoints.length < 2) {
                showToast('請先選擇起點與終點', 'error');
                return;
            }
            
            const start = waypoints[0];
            const end = waypoints[waypoints.length - 1];
            const intermediate = waypoints.slice(1, -1);
            
            // Google Maps 網址格式
            let url = `https://www.google.com/maps/dir/?api=1&origin=${start.lat},${start.lng}&destination=${end.lat},${end.lng}`;
            
            if (intermediate.length > 0) {
                const waypointsStr = intermediate.map(w => `${w.lat},${w.lng}`).join('|');
                url += `&waypoints=${waypointsStr}`;
            }
            
            window.open(url, '_blank');
        });

        // 註冊 Service Worker (PWA)
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker 註冊成功'))
                    .catch(err => console.log('Service Worker 註冊失敗'));
            });
        }

        // 處理 PWA 安裝提示 (Android/Chrome)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // --- 授權機制 ---
        // 自動判斷 API 位置 (方便本機測試與線上部署)
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '5500';
        // 如果是 Vercel 部署，後端就在同一個網址下
        const API_BASE_URL = isLocal ? 'http://localhost:3000' : window.location.origin; 
        
        const activationOverlay = document.getElementById('activation-overlay');
        const appContainer = document.getElementById('appContainer');
        const activateBtn = document.getElementById('activateBtn');
        const licenseKeyInput = document.getElementById('licenseKeyInput');
        const errorMsg = document.getElementById('errorMsg');

        // 管理員後門：點擊標題 5 次顯示裝置 ID 或強制進入 (測試用)
        let clickCount = 0;
        document.querySelector('#activation-overlay h2').addEventListener('click', () => {
            clickCount++;
            const deviceId = getOrCreateDeviceId();
            if (clickCount >= 3) {
                errorMsg.innerText = `偵錯資訊: ID=${deviceId.substring(0, 8)}...`;
                errorMsg.classList.remove('text-red-500');
                errorMsg.classList.add('text-gray-400');
            }
            if (clickCount >= 7) {
                unlockApp();
                showToast('已進入測試模式');
            }
        });

        // 取得或產生裝置 ID (更強健的版本)
        function getOrCreateDeviceId() {
            try {
                let deviceId = localStorage.getItem('deviceId');
                if (!deviceId) {
                    // 優先使用 crypto.randomUUID()，若無則回退到時間戳+隨機數
                    if (window.crypto && window.crypto.randomUUID) {
                        deviceId = crypto.randomUUID();
                    } else {
                        deviceId = 'dev-' + Date.now() + '-' + Math.floor(Math.random() * 1000000);
                    }
                    localStorage.setItem('deviceId', deviceId);
                }
                return deviceId;
            } catch (e) {
                console.error('無法存取 localStorage:', e);
                return 'temp-' + Date.now();
            }
        }

        async function checkActivation() {
            const deviceId = getOrCreateDeviceId();
            console.log('當前裝置 ID:', deviceId);
            
            try {
                const response = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceId })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`伺服器錯誤 (${response.status}): ${errorText}`);
                }

                const data = await response.json();
                if (data.success && data.isActivated) {
                    unlockApp();
                } else {
                    showActivationOverlay();
                }
            } catch (error) {
                console.error('驗證失敗:', error);
                errorMsg.innerText = `連線失敗: ${error.message}`;
                showActivationOverlay();
            }
        }

        function showActivationOverlay() {
            appContainer.classList.add('hidden');
            activationOverlay.classList.remove('hidden');
            activationOverlay.style.opacity = '1';
        }

        function unlockApp() {
            activationOverlay.style.opacity = '0';
            setTimeout(() => {
                activationOverlay.classList.add('hidden');
                appContainer.classList.remove('hidden');
                // 確保地圖在容器顯示後正確計算大小
                map.invalidateSize();
            }, 500);
        }

        activateBtn.addEventListener('click', async () => {
            const licenseKey = licenseKeyInput.value.trim();
            const deviceId = getOrCreateDeviceId();
            errorMsg.innerText = '';

            if (!licenseKey) {
                errorMsg.innerText = '授權碼不能為空';
                return;
            }

            try {
                activateBtn.disabled = true;
                activateBtn.innerText = '驗證中...';

                const response = await fetch(`${API_BASE_URL}/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ licenseKey, deviceId })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    unlockApp();
                } else {
                    errorMsg.innerText = data.message || '啟用失敗，請重試。';
                }
            } catch (error) {
                errorMsg.innerText = '無法連接啟用伺服器，請檢查網路連線。';
            } finally {
                activateBtn.disabled = false;
                activateBtn.innerText = '啟用程式';
            }
        });

        // 初始化檢查
        document.addEventListener('DOMContentLoaded', checkActivation);

        // --- Loader --- 
        const loader = document.getElementById('loading-overlay');
        function showLoader() {
            loader.classList.remove('hidden');
        }
        function hideLoader() {
            loader.classList.add('hidden');
        }

        // --- Toast Notification ---
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        let toastTimeout;

        function showToast(message, type = 'success') {
            toastMessage.innerText = message;

            // Change color based on type
            if (type === 'error') {
                toast.classList.remove('bg-green-500');
                toast.classList.add('bg-red-500');
            } else {
                toast.classList.remove('bg-red-500');
                toast.classList.add('bg-green-500');
            }

            toast.classList.remove('translate-x-[120%]', 'opacity-0');
            toast.classList.add('translate-x-0', 'opacity-100');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-[120%]', 'opacity-0');
            }, 3000);
        }

    </script>
</body>
</html>
